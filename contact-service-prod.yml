spring:
  datasource:
    url: jdbc:mysql://prod-db-server:3306/contact_service_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8002
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.contact: INFO
  file:
    name: /var/log/contact-service/application.log
    max-size: 10MB
    max-history: 30

# Configuration Files for Microservices Config Server
# These files should be pushed to: https://github.com/sysadiya/microservice-config

# FILE: user-service.yml
# PURPOSE: Common configuration for user-service (all profiles)
# LOCATION: Root of GitHub repository

spring:
  application:
    name: user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

server:
  servlet:
    context-path: /Pdaece123
